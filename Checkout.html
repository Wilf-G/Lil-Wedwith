<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="Website_Colour.css">
</head>

<body>

    <header>
        <h1>Food Inc.</h1>
    </header>

    <section class="rectangle">
        
        <nav>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="About_Us.html">About Us</a>
                <a href="Get_Started.html">Get Started</a>
                <a href="Contact_Us.html">Contact Us</a>
                <a href="Checkout.html">Checkout</a>
            </div>
        </nav>
    </section>
    
    <div id="order-receipt" class="option-box" style="display: none; width: 100%; max-width: 600px; margin: 20px auto; background: white; border: 3px solid #000b3d;">
        <h2 style="color: #ff6b6b;">Order Summary</h2>
        <div id="receipt-content" style="text-align: left; padding: 20px; line-height: 2;">
            </div>
        <button onclick="window.location.href='index.html'" style="width: auto; padding: 10px 30px;">Back to Home</button>
    </div>

        <div class="checkout-options">

            <div class="option-box">
                <h2>Delivery to Home</h2>
                <form>
                    <label>Full Name</label>
                    <input type="text" required>

                    <label>Address</label>
                    <input type="text" required>

                    <label>Postcode</label>
                    <input type="text" required>

                    <label>Phone Number</label>
                    <input type="tel" required>

                    <button type="submit">Order Delivery</button>
                </form>
            </div>

            <div class="option-box">
                <h2>Table Service</h2>
                <form>
                    <label>Full Name</label>
                    <input type="text" required>

                    <label>Table Number</label>
                    <input type="number" required>

                    <label>Number of Guests</label>
                    <input type="number" required>

                    <button type="submit">Order to Table</button>
                </form>
            </div>

        </div>

    </section>
</body>
</html>
